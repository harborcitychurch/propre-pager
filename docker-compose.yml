# ignored options for 'proprepager'
# -P
version: '3.8'
services:
    server:
        build: .
        volumes:
            - ./data:/app/data
            - ./html:/app/html
        env_file:
            - .env
        image: bluedog8050/proprepager
        ports:
            - "80"
            - "443"
        restart: always